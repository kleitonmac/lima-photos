<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="public/logo.png" />
    <link rel="apple-touch-icon" href="/public/logo.png" />

    <!-- SEO PROFISSIONAL FOTÓGRAFO -->
    <title>Cleiveson Lima | Fotógrafo Profissional - Espírito Santo</title>
    <meta
      name="description"
      content="Fotógrafo profissional em Maceió, AL. Especialista em ensaios, casamentos, eventos e turismo. Portfólio completo de fotografia autêntica e emocional."
    />

    <!-- OPEN GRAPH (Facebook/LinkedIn) -->
    <meta
      property="og:title"
      content="Cleiveson Lima | Fotógrafo Profissional"
    />
    <meta
      property="og:description"
      content="Fotografia autêntica para momentos inesquecíveis. Ensaios, casamentos e eventos em Espírito Santo."
    />
    <meta
      property="og:image"
      content="https://lima-photos.vercel.app/logo.png"
    />
    <meta property="og:url" content="https://lima-photos.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Cleiveson Lima | Fotógrafo Profissional"
    />
    <meta
      name="twitter:description"
      content="Fotografia profissional em Maceió, AL - Ensaios, casamentos, eventos e turismo."
    />
    <meta
      name="twitter:image"
      content="https://lima-photos.vercel.app/logo.png"
    />

    <!-- KEYWORDS FOTOGRAFIA LOCAL -->
    <meta
      name="keywords"
      content="fotógrafo Maceió AL, fotografia casamentos, ensaios fotográficos, fotógrafo Espírito Santo, eventos Vitória, fotografia profissional"
    />

    <!-- SCHEMA.ORG FOTÓGRAFO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Photographer",
        "name": "Cleiveson Lima",
        "description": "Fotógrafo profissional especializado em ensaios, casamentos e eventos no Espírito Santo",
        "url": "https://lima-photos.vercel.app",
        "image": "https://lima-photos.vercel.app/logo.png",
        "address": {
          "@type": "",
          "addressLocality": "Maceió",
          "addressRegion": "AL",
          "addressCountry": "BR"
        },
        "areaServed": "Maceió",
        "telephone": "+55-(82)-996445994"
      }
    </script>

    <!-- CANONICAL -->
    <link rel="canonical" href="https://lima-photos.vercel.app/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
